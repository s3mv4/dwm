# Shadows
shadow = false
shadow-radius = 12
shadow-opacity = 0.75
shadow-offset-x = -15
shadow-offset-y = -15
shadow-color = "#000000"
shadow-exclude = [
  "class_g = 'dwm'"
]

# Fading
fading = false
fade-in-step = 0.028
fade-out-step = 0.03

# Transparency / Opacity
inactive-opacity = 1.0
frame-opacity = 1.0
inactive-opacity-override = false
active-opacity = 1.0
inactive-dim = 0.0
# opacity-rule = [
#     "90:class_g = 'st-256color'",
#     "90:class_g = 'dwm'"
# ]

# Corners
corner-radius = 8
rounded-corners-exclude = [
    "class_g = 'dwm'"
]

# Background-Blurring
blur-method = "dual_kawase"
blur-strength = 5

# General Settings
backend = "glx"
vsync = true
mark-wmwin-focused = true
mark-ovredir-focused = false
detect-rounded-corners = true
detect-client-opacity = true
detect-transient = true
glx-no-stencil = true
use-damage = true
